trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - frontend/**

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: 'Build and Push Frontend Image'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: acr-service-connection
          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              dockerfile: frontend/Dockerfile
              buildContext: frontend/
              arguments: --build-arg REACT_APP_API_URL=https://app-taskapp-backend-ayesha.azurewebsites.net
              tags: |
                $(imageTag)
                latest
          - task: Docker@2
            displayName: 'Push Frontend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

  - stage: DeployProd
    displayName: 'Deploy Frontend to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo 'Frontend deployed via Static Web App GitHub Actions'
                  displayName: 'Frontend Deployment Note'
